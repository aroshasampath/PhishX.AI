<!DOCTYPE html>
<html>
<head>
    <title>Photo Scan - PhishX.AI</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="layout">
    <aside class="sidebar">
        <h2>PhishX.AI</h2>
        <p>Email Threat Scanner</p>
        <a href="/">Dashboard</a>
        <a href="/text-scan">Text Scan</a>
        <a class="active" href="/image-scan">Photo Scan</a>
        <a href="/security-advice">Security Advice</a>
    </aside>

    <main class="main">
        <div class="page-title">
            <h1>Email Screenshot / Photo Scan</h1>
            <p>Upload an email screenshot. The system extracts text and scans it.</p>
        </div>

        <div class="scan-box">
            <label>Sender Domain optional</label>
            <input id="senderDomain" type="text" placeholder="example: paypal.com">

            <label>Upload Image</label>
            <input id="imageFile" type="file" accept="image/*">

            <button onclick="scanImage()">Scan Photo</button>
        </div>

        <div id="ocrText" class="ocr-box hidden"></div>
        <div id="report" class="report hidden"></div>
    </main>
</div>

<script src="/static/script.js"></script>
<script>
async function scanImage() {
    const file = document.getElementById("imageFile").files[0];
    const senderDomain = document.getElementById("senderDomain").value;

    if (!file) {
        alert("Please upload an image.");
        return;
    }

    const formData = new FormData();
    formData.append("file", file);
    formData.append("sender_domain", senderDomain);

    const res = await fetch("/scan-image", { method: "POST", body: formData });
    const data = await res.json();

    const ocrBox = document.getElementById("ocrText");
    ocrBox.classList.remove("hidden");
    ocrBox.innerHTML = `
        <h3>Extracted Text</h3>
        <pre>${data.extracted_text || "No text extracted"}</pre>
    `;

    renderReport(data);
}
</script>

</body>
</html>
